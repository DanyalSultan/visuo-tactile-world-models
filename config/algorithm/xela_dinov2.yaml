_target_: tactile_ssl.algorithm.XelaDINOv2Module
encoder:
  _target_: tactile_ssl.model.xela_base
  in_dim: 368 # total number of xela sensors in hand
  in_chans: 6 # 3 xela mag channels + 3 position channels
  sequence_length: 10
  time_chunk_size: 10
  num_register_tokens: 1
  pos_embed_fn: learned
  with_masktoken: True
  drop_path_rate: 0.3
  drop_path_uniform: True
  normalization: ${data.normalization}
  causal: False

dino_head:
  _partial_: True
  _target_: tactile_ssl.model.layers.DINOHead
  out_dim: 65536

num_global_masks: 2
num_local_masks: 8
min_keep_num_sensors: 1
global_mask_scale: [0.4, 1.0]
local_mask_scale: [0.1, 0.4]
moving_average_decay: [0.994, 1.0]
allow_mask_overlap: True
teacher_temp: [0.04, 0.07]
teacher_warmup_epochs: 10

optim_cfg:
  _partial_: True
  _target_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 0.05

lr_scheduler_cfg:
  _partial_: True
  _target_: tactile_ssl.model.custom_scheduler.WarmupCosineScheduler
  steps_per_epoch: ???
  T_max: ???
  final_lr: 1.0e-6
  start_lr: 1e-5
  warmup_epochs: 30

wd_scheduler_cfg:
  _partial_: True
  _target_: tactile_ssl.model.custom_scheduler.CosineWDSchedule
  final_weight_decay: 0.4
  ref_weight_decay: 0.04
  T_max: ???

online_probes:
  - _target_: tactile_ssl.probe.OnlineProbeModule
    probe_name: "reconstruction"
    decoder:
      _target_: tactile_ssl.probe.reconstruction.SignalDecoderBase
      in_dim: ${algorithm.encoder.in_dim}
      in_chans: ${algorithm.encoder.in_chans}
      sequence_length: ${algorithm.encoder.sequence_length}
      time_chunk_size: ${algorithm.encoder.time_chunk_size}
      input_embed_dim: ${model_embed_dim}
      embed_dim: 192
      depth: 4
    loss_fn:
      _target_: torch.nn.MSELoss

  - _target_: tactile_ssl.probe.online_probe.OnlineProbeModule
    probe_name: "object_classification"
    decoder:
      _target_: tactile_ssl.probe.classification.LinearClassifier
      input_embed_dim: ${model_embed_dim}
      classes: ${data.object_classes}
      class_weights: ${data.object_class_weights}
    loss_fn:
      _partial_: true
      _target_: torch.nn.CrossEntropyLoss

online_probes_lrs: [1e-4, 1e-4]
reconstruction_log_freq: 20

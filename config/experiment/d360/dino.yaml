# @package _global_
defaults:
  - override /paths: ~
  - override /wandb: ~
  - override /data: d360
  - override /algorithm: d360_dino
  - _self_

model_size: tiny

attn_cls: Attention

use_img: true
use_mic: true
use_imu: true
use_pressure: true

img_size: [224, 224]
img_chans: 6
img_patch_size: 16

mic_size: [224, 256]
mic_chans: 1
mic_patch_size: 16

imu_size: 224
imu_chans: 3
imu_patch_size: 4

pressure_size: 224
pressure_chans: 1
pressure_patch_size: 4

sensor_sizes:
  img: ${img_size}
  mic: ${mic_size}
  imu: ${imu_size}
  pressure: ${pressure_size}

sensor_chans:
  img: ${img_chans}
  mic: ${mic_chans}
  imu: ${imu_chans}
  pressure: ${pressure_chans}

patch_sizes:
  img: ${img_patch_size}
  mic: ${mic_patch_size}
  imu: ${imu_patch_size}
  pressure: ${pressure_patch_size}

fusion_type: bottleneck

experiment_name: D360-DINO-${d360_expt_name:${use_img}, ${use_mic}, ${use_imu}, ${use_pressure}, ${model_size}, ${attn_cls}, ${fusion_type}}
ckpt_path: ~

wandb:
  project: d360_ssl
  group: ${experiment_name}
  id: ${hydra:job.id}-${experiment_name}
  tags:
    - dino
    - ${model_size}_${model_embed_dim}
    - ${fusion_type}
    - ${d360_modal_tag:${use_img}, ${use_mic}, ${use_imu}, ${use_pressure}}
    - ${attn_cls}

trainer:
  max_epochs: 200
  validation_frequency: 5
  checkpoint_frequency: 25
  log_frequency: 50
  grad_clip_norm: 10.0

algorithm:
  encoder:
    _target_: tactile_ssl.model.d360_transformer.dit_${model_size}
    fusion_layer: 8
    num_bottlenecks: 4
    drop_path_rate: 0.1
    pos_embed_fn: sinusoidal

  dino_head:
    out_dim: 65536

  online_probes:
    - _target_: tactile_ssl.probe.online_probe.OnlineProbeModule
      probe_name: "reconstruction"
      decoder:
        _target_: tactile_ssl.model.d360_transformer.dit_decoder
        modal_chans: ${model_embed_dim}
        embed_dim: 192
        depth: 4
        num_heads: 12
        use_img: ${use_img}
        use_mic: ${use_mic}
        use_imu: ${use_imu}
        use_pressure: ${use_pressure}
        sensor_sizes: ${sensor_sizes}
        sensor_chans: ${sensor_chans}
        patch_sizes: ${patch_sizes}
        fusion_type: bottleneck
        fusion_layer: 3
        num_bottlenecks: 4
        normalization: ${data.sensor.d360.dataset.config.normalization}
      loss_fn:
        _partial_: false
        _target_: torch.nn.MSELoss

    - _target_: tactile_ssl.probe.online_probe.OnlineProbeModule
      probe_name: "object_classification"
      decoder:
        _target_: tactile_ssl.probe.classification.Classifier
        input_embed_dim: ${model_embed_dim}
        classes: ${data.sensor.d360.dataset.config.data.label.object.cls}
        class_weights: ${data.sensor.d360.dataset.config.data.label.object.weight}
        with_attentive_pooling: true
      loss_fn:
        _partial_: true
        _target_: torch.nn.CrossEntropyLoss

    - _target_: tactile_ssl.probe.online_probe.OnlineProbeModule
      probe_name: "action_classification"
      decoder:
        _target_: tactile_ssl.probe.classification.Classifier
        input_embed_dim: ${model_embed_dim}
        classes: ${data.sensor.d360.dataset.config.data.label.action.cls}
        class_weights: ${data.sensor.d360.dataset.config.data.label.action.weight}
        with_attentive_pooling: true
      loss_fn:
        _partial_: true
        _target_: torch.nn.CrossEntropyLoss

  online_probes_lrs: [1e-4, 1e-4, 1e-4]
  log_freq_reconstruction: 100

  optim_cfg:
    lr: 1e-4
    weight_decay: 0.05

  lr_scheduler_cfg:
    final_lr: 1e-6
    start_lr: 1e-5
    warmup_epochs: 30

job_id: ${now:%Y%m%d%H%M%S}

hydra:
  job:
    id: ${job_id}
  run:
    dir: ${paths.log_dir}/${job_id}-${experiment_name}
  sweep:
    dir: ${paths.log_dir}/${job_id}-${experiment_name}

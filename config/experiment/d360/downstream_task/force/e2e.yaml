# @package _global_
defaults:
  - override /paths: ~
  - override /wandb: ~
  - override /data: d360_contact_gs
  - override /task: d360_t1_force_estimation
  - _self_

experiment_name: D360-E2E-${d360_expt_name:${use_img}, ${use_mic}, ${use_imu}, ${use_pressure}, ${model_size}, ${attn_cls}, ${fusion_type}}-${capitalize:${sensor_used}}-${data_info.${ssl_data}}-${train_data_budget}
checkpoint_encoder: ~

model_size: base

use_img: true
use_mic: true
use_imu: true
use_pressure: true

img_size: [224, 224]
img_chans: 6
img_patch_size: 16

mic_size: [224, 256]
mic_chans: 1
mic_patch_size: 16

imu_size: 224
imu_chans: 3
imu_patch_size: 4

pressure_size: 224
pressure_chans: 1
pressure_patch_size: 4

sensor_sizes:
  img: ${img_size}
  mic: ${mic_size}
  imu: ${imu_size}
  pressure: ${pressure_size}

sensor_chans:
  img: ${img_chans}
  mic: ${mic_chans}
  imu: ${imu_chans}
  pressure: ${pressure_chans}

patch_sizes:
  img: ${img_patch_size}
  mic: ${mic_patch_size}
  imu: ${imu_patch_size}
  pressure: ${pressure_patch_size}

fusion_type: bottleneck
attn_cls: MemEffAttention

ssl_alg: e2e
ssl_data: full

resume_id: ~
ckpt_path: ~

train_data_budget: 1.0
val_data_budget: 1.0

data:
  sensor: d360

trainer:
  save_probe_weights_only: false

task:
  model_encoder:
    fusion_layer: 8
    num_bottlenecks: 4
    drop_path_rate: 0.1
    pos_embed_fn: sinusoidal

  train_encoder: true
